<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Mg Export</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 16px;
      }
      button {
        width: 100%;
        margin-bottom: 8px;
        padding: 8px;
      }
      pre {
        font-size: 11px;
        max-height: 100px;
        overflow: auto;
        background: #f6f6f6;
        padding: 8px;
      }
    </style>
  </head>
  <body>
    <button id="page">导出当前页面</button>
    <button id="selection">导出当前选区</button>
    <button id="close">关闭</button>
    <pre id="status">等待导出…</pre>
    <script>
      const status = document.getElementById("status");
      document.getElementById("page").onclick = () => parent.postMessage({ pluginMessage: { type: "export:page" } }, "*");
      document.getElementById("selection").onclick = () => parent.postMessage({ pluginMessage: { type: "export:selection" } }, "*");
      document.getElementById("close").onclick = () => parent.postMessage({ pluginMessage: { type: "close" } }, "*");

      window.onmessage = (event) => {
        const payload = event.data.pluginMessage;
        if (!payload || payload.type !== "export:result") return;
        const diagnosticsCount = payload.payload.document.diagnostics.length;
        status.textContent = `导出成功: nodes=${payload.payload.document.nodes.length}, diagnostics=${diagnosticsCount}`;
      };
    </script>
  </body>
</html>
