<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Mg to Fig Exporter</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #1f1f1f;
        --panel: #292929;
        --panel-strong: #333333;
        --text: #f4f4f4;
        --muted: #a8a8a8;
        --border: #3d3d3d;
        --primary: #3f7cff;
        --primary-hover: #2f68df;
        --danger: #ff5c5c;
        --ok: #47c985;
        --warn: #ffbd4a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
      }

      .app {
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-height: 100vh;
        padding: 14px;
      }

      .header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      h1 {
        margin: 0 0 4px;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .subtitle {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }

      .badge {
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--muted);
        padding: 4px 7px;
        white-space: nowrap;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      button {
        appearance: none;
        border: 1px solid transparent;
        border-radius: 6px;
        cursor: pointer;
        font: inherit;
        min-height: 40px;
        padding: 9px 10px;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .primary {
        background: var(--primary);
        color: #ffffff;
        font-weight: 650;
      }

      .primary:hover:not(:disabled) {
        background: var(--primary-hover);
      }

      .secondary {
        background: var(--panel-strong);
        border-color: var(--border);
        color: var(--text);
      }

      .secondary:hover:not(:disabled) {
        border-color: #666666;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 11px;
      }

      .panel-title {
        align-items: center;
        display: flex;
        font-weight: 650;
        justify-content: space-between;
        margin-bottom: 8px;
      }

      .dot {
        border-radius: 50%;
        display: inline-block;
        height: 8px;
        margin-right: 6px;
        width: 8px;
      }

      .idle { background: var(--muted); }
      .busy { background: var(--warn); }
      .success { background: var(--ok); }
      .failed { background: var(--danger); }

      .status-text {
        color: var(--muted);
        line-height: 1.5;
        margin: 0;
      }

      .metrics {
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(4, 1fr);
      }

      .metric {
        background: #222222;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 8px;
        min-width: 0;
      }

      .metric strong {
        display: block;
        font-size: 16px;
        margin-bottom: 2px;
      }

      .metric span {
        color: var(--muted);
        font-size: 11px;
      }

      .tools {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .log {
        background: #171717;
        border: 1px solid var(--border);
        border-radius: 6px;
        color: #d8d8d8;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 11px;
        line-height: 1.45;
        margin: 0;
        max-height: 112px;
        overflow: auto;
        padding: 8px;
        white-space: pre-wrap;
      }

      .log-wrap {
        position: relative;
      }

      .copy-log {
        align-items: center;
        background: rgba(63, 124, 255, 0.94);
        border: 0;
        border-radius: 5px;
        color: #ffffff;
        display: flex;
        height: 28px;
        justify-content: center;
        min-height: 28px;
        opacity: 0;
        padding: 0;
        pointer-events: none;
        position: absolute;
        right: 8px;
        top: 8px;
        transition: opacity 120ms ease;
        width: 28px;
      }

      .log-wrap:hover .copy-log {
        opacity: 1;
        pointer-events: auto;
      }

      .copy-log svg {
        height: 15px;
        width: 15px;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="header">
        <div>
          <h1>Mg to Fig Exporter</h1>
          <div class="subtitle" id="context">正在连接 MasterGo...</div>
        </div>
        <div class="badge" id="version">v0.1</div>
      </section>

      <section class="actions">
        <button class="primary" id="page">解析当前页面</button>
        <button class="primary" id="selection">解析当前选区</button>
      </section>

      <section class="panel">
        <div class="panel-title">
          <span><i class="dot idle" id="statusDot"></i>运行状态</span>
          <span id="lastRun">未运行</span>
        </div>
        <p class="status-text" id="statusText">等待导出指令。</p>
      </section>

      <section class="metrics">
        <div class="metric">
          <strong id="nodes">0</strong>
          <span>节点</span>
        </div>
        <div class="metric">
          <strong id="assets">0</strong>
          <span>资源</span>
        </div>
        <div class="metric">
          <strong id="tokens">0</strong>
          <span>Token</span>
        </div>
        <div class="metric">
          <strong id="diagnostics">0</strong>
          <span>诊断</span>
        </div>
      </section>

      <section class="tools">
        <button class="secondary" id="copy" disabled>复制结构 JSON</button>
        <button class="secondary" id="download" disabled>下载 .mgfig</button>
        <button class="secondary" id="diagnose">诊断</button>
      </section>

      <section class="panel">
        <div class="panel-title">诊断与上报</div>
        <div class="log-wrap">
          <button class="copy-log" id="copyLog" title="复制诊断内容" aria-label="复制诊断内容">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
          </button>
          <pre class="log" id="log">暂无诊断信息。</pre>
        </div>
      </section>
    </main>

    <script>
      const state = {
        status: "idle",
        logs: [],
        lastResult: null,
        lastError: null
      };

      const $ = (id) => document.getElementById(id);
      const buttons = ["page", "selection"].map((id) => $(id));

      function send(type, payload = {}) {
        parent.postMessage({ type, payload }, "*");
      }

      function setBusy(isBusy) {
        for (const button of buttons) {
          button.disabled = isBusy;
        }
      }

      function setStatus(status, text) {
        state.status = status;
        $("statusText").textContent = text;
        $("lastRun").textContent = new Date().toLocaleTimeString();
        $("statusDot").className = `dot ${status}`;
      }

      function pushLog(line) {
        const stamped = `[${new Date().toLocaleTimeString()}] ${line}`;
        state.logs.unshift(stamped);
        state.logs = state.logs.slice(0, 60);
        $("log").textContent = state.logs.join("\\n");
      }

      function updateMetrics(summary = {}) {
        $("nodes").textContent = String(summary.nodes ?? 0);
        $("assets").textContent = String(summary.assets ?? 0);
        $("tokens").textContent = String(summary.tokens ?? 0);
        $("diagnostics").textContent = String(summary.diagnostics ?? 0);
      }

      async function copyText(text) {
        if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(text);
          return true;
        }
        const textarea = document.createElement("textarea");
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        const ok = document.execCommand("copy");
        textarea.remove();
        return ok;
      }

      function downloadJson(filename, data) {
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = url;
        anchor.download = filename;
        anchor.click();
        URL.revokeObjectURL(url);
      }

      function downloadBlob(filename, blob) {
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = url;
        anchor.download = filename;
        anchor.click();
        URL.revokeObjectURL(url);
      }

      function base64ToBytes(base64) {
        const normalized = String(base64 ?? "").replace(/^data:[^;]+;base64,/, "");
        if (!normalized) return new Uint8Array();
        const binary = atob(normalized);
        const bytes = new Uint8Array(binary.length);
        for (let index = 0; index < binary.length; index += 1) {
          bytes[index] = binary.charCodeAt(index);
        }
        return bytes;
      }

      function makeCrcTable() {
        const table = new Uint32Array(256);
        for (let index = 0; index < 256; index += 1) {
          let value = index;
          for (let bit = 0; bit < 8; bit += 1) {
            value = value & 1 ? 0xedb88320 ^ (value >>> 1) : value >>> 1;
          }
          table[index] = value >>> 0;
        }
        return table;
      }

      const crcTable = makeCrcTable();
      const encoder = new TextEncoder();

      function crc32(bytes) {
        let crc = 0xffffffff;
        for (const byte of bytes) {
          crc = crcTable[(crc ^ byte) & 0xff] ^ (crc >>> 8);
        }
        return (crc ^ 0xffffffff) >>> 0;
      }

      function writeUint16(target, offset, value) {
        target[offset] = value & 0xff;
        target[offset + 1] = (value >>> 8) & 0xff;
      }

      function writeUint32(target, offset, value) {
        target[offset] = value & 0xff;
        target[offset + 1] = (value >>> 8) & 0xff;
        target[offset + 2] = (value >>> 16) & 0xff;
        target[offset + 3] = (value >>> 24) & 0xff;
      }

      function createStoredZip(fileEntries) {
        const localParts = [];
        const centralParts = [];
        let offset = 0;

        for (const entry of fileEntries) {
          const nameBytes = encoder.encode(entry.name);
          const bytes = entry.bytes instanceof Uint8Array ? entry.bytes : encoder.encode(String(entry.bytes ?? ""));
          const checksum = crc32(bytes);

          const local = new Uint8Array(30 + nameBytes.length);
          writeUint32(local, 0, 0x04034b50);
          writeUint16(local, 4, 20);
          writeUint16(local, 6, 0x0800);
          writeUint16(local, 8, 0);
          writeUint16(local, 10, 0);
          writeUint16(local, 12, 0);
          writeUint32(local, 14, checksum);
          writeUint32(local, 18, bytes.length);
          writeUint32(local, 22, bytes.length);
          writeUint16(local, 26, nameBytes.length);
          writeUint16(local, 28, 0);
          local.set(nameBytes, 30);
          localParts.push(local, bytes);

          const central = new Uint8Array(46 + nameBytes.length);
          writeUint32(central, 0, 0x02014b50);
          writeUint16(central, 4, 20);
          writeUint16(central, 6, 20);
          writeUint16(central, 8, 0x0800);
          writeUint16(central, 10, 0);
          writeUint16(central, 12, 0);
          writeUint16(central, 14, 0);
          writeUint32(central, 16, checksum);
          writeUint32(central, 20, bytes.length);
          writeUint32(central, 24, bytes.length);
          writeUint16(central, 28, nameBytes.length);
          writeUint16(central, 30, 0);
          writeUint16(central, 32, 0);
          writeUint16(central, 34, 0);
          writeUint16(central, 36, 0);
          writeUint32(central, 38, 0);
          writeUint32(central, 42, offset);
          central.set(nameBytes, 46);
          centralParts.push(central);

          offset += local.length + bytes.length;
        }

        const centralSize = centralParts.reduce((sum, part) => sum + part.length, 0);
        const end = new Uint8Array(22);
        writeUint32(end, 0, 0x06054b50);
        writeUint16(end, 4, 0);
        writeUint16(end, 6, 0);
        writeUint16(end, 8, fileEntries.length);
        writeUint16(end, 10, fileEntries.length);
        writeUint32(end, 12, centralSize);
        writeUint32(end, 16, offset);
        writeUint16(end, 20, 0);

        return new Blob([...localParts, ...centralParts, end], { type: "application/zip" });
      }

      function extensionFromMime(mimeType) {
        if (mimeType === "image/jpeg") return "jpg";
        if (mimeType === "image/webp") return "webp";
        if (mimeType === "image/svg+xml") return "svg";
        return "png";
      }

      function safeAssetName(asset) {
        return String(asset.id ?? "asset").replace(/[^a-zA-Z0-9._-]/g, "_");
      }

      function buildMigrationPackage(documentData) {
        const document = JSON.parse(JSON.stringify(documentData));
        const manifestAssets = [];
        const files = [];

        for (const asset of document.assets ?? []) {
          const manifestAsset = {
            id: asset.id,
            type: asset.type ?? "image",
            mimeType: asset.mimeType ?? "application/octet-stream",
            path: null,
            sizeBytes: Number(asset.sizeBytes ?? 0),
            checksum: asset.checksum ?? null,
            width: asset.width ?? null,
            height: asset.height ?? null,
            sourceNodeIds: asset.sourceNodeIds ?? [],
            fallbackUri: asset.uri ?? null
          };

          if (asset.data) {
            const extension = extensionFromMime(asset.mimeType);
            const path = `assets/${safeAssetName(asset)}.${extension}`;
            const bytes = base64ToBytes(asset.data);
            manifestAsset.path = path;
            manifestAsset.sizeBytes = bytes.length;
            manifestAsset.checksum = String(crc32(bytes));
            files.push({ name: path, bytes });
            asset.transport = "package";
            asset.path = path;
            asset.uri = asset.uri ?? null;
            asset.data = null;
            asset.sizeBytes = bytes.length;
            asset.checksum = manifestAsset.checksum;
          }

          manifestAssets.push(manifestAsset);
        }

        const manifest = {
          packageVersion: "0.1.0",
          createdAt: new Date().toISOString(),
          documentPath: "document.json",
          diagnosticsPath: "diagnostics.json",
          assets: manifestAssets
        };

        files.unshift(
          { name: "document.json", bytes: encoder.encode(JSON.stringify(document, null, 2)) },
          { name: "manifest.json", bytes: encoder.encode(JSON.stringify(manifest, null, 2)) },
          { name: "diagnostics.json", bytes: encoder.encode(JSON.stringify(document.diagnostics ?? [], null, 2)) }
        );

        return {
          blob: createStoredZip(files),
          manifest
        };
      }

      $("page").onclick = () => {
        setBusy(true);
        setStatus("busy", "已发送解析当前页面指令。");
        pushLog("解析当前页面: 指令已发送");
        send("export:page");
      };

      $("selection").onclick = () => {
        setBusy(true);
        setStatus("busy", "已发送解析当前选区指令。");
        pushLog("解析当前选区: 指令已发送");
        send("export:selection");
      };

      $("copy").onclick = async () => {
        if (!state.lastResult?.document) return;
        await copyText(JSON.stringify(state.lastResult.document, null, 2));
        pushLog("结构 JSON 已复制（仅调试预览，正式方案需 .mgfig 资源包）");
      };

      $("download").onclick = () => {
        if (!state.lastResult?.document) return;
        const { blob, manifest } = buildMigrationPackage(state.lastResult.document);
        downloadBlob("mg-to-fig-package.mgfig", blob);
        const packagedAssets = manifest.assets.filter((asset) => asset.path).length;
        pushLog(`.mgfig 迁移包下载已触发: packagedAssets=${packagedAssets}, fallbackAssets=${manifest.assets.length - packagedAssets}`);
      };

      $("diagnose").onclick = () => {
        const diagnostics = state.lastResult?.document?.diagnostics ?? [];
        if (state.lastError) {
          $("log").textContent = JSON.stringify(state.lastError, null, 2);
          return;
        }
        $("log").textContent = diagnostics.length
          ? JSON.stringify(diagnostics, null, 2)
          : "暂无诊断信息。";
      };

      $("copyLog").onclick = async () => {
        await copyText($("log").textContent);
        pushLog("诊断内容已复制");
      };

      window.onmessage = (event) => {
        const message = event.data?.pluginMessage ?? event.data;
        if (!message?.type) return;

        if (message.type === "plugin:ready") {
          $("context").textContent = `当前页: ${message.payload.pageName ?? "unknown-page"}`;
          setStatus("idle", message.payload.message ?? "插件已就绪。");
          pushLog("插件已就绪");
        }

        if (message.type === "export:status") {
          setStatus("busy", message.payload.message);
          pushLog(`${message.payload.phase}: ${message.payload.message}`);
        }

        if (message.type === "export:result") {
          state.lastResult = message.payload;
          state.lastError = null;
          setBusy(false);
          setStatus(message.payload.validation?.valid ? "success" : "failed", "导出完成。");
          updateMetrics(message.payload.summary);
          $("copy").disabled = false;
          $("download").disabled = false;
          pushLog(`导出完成: nodes=${message.payload.summary.nodes}, assets=${message.payload.summary.assets}, diagnostics=${message.payload.summary.diagnostics}`);
        }

        if (message.type === "export:error") {
          state.lastError = message.payload;
          setBusy(false);
          setStatus("failed", message.payload.message);
          pushLog(`导出失败: ${message.payload.message}`);
          $("log").textContent = JSON.stringify(message.payload, null, 2);
        }
      };

      setStatus("idle", "等待导出指令。");
      send("ui:ready");
    </script>
  </body>
</html>
