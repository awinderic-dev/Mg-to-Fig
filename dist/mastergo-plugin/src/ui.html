<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Mg to Fig Exporter</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #1f1f1f;
        --panel: #292929;
        --panel-strong: #333333;
        --text: #f4f4f4;
        --muted: #a8a8a8;
        --border: #3d3d3d;
        --primary: #3f7cff;
        --primary-hover: #2f68df;
        --danger: #ff5c5c;
        --ok: #47c985;
        --warn: #ffbd4a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
      }

      .app {
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-height: 100vh;
        padding: 14px;
      }

      .header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      h1 {
        margin: 0 0 4px;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .subtitle {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }

      .badge {
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--muted);
        padding: 4px 7px;
        white-space: nowrap;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      button {
        appearance: none;
        border: 1px solid transparent;
        border-radius: 6px;
        cursor: pointer;
        font: inherit;
        min-height: 40px;
        padding: 9px 10px;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .primary {
        background: var(--primary);
        color: #ffffff;
        font-weight: 650;
      }

      .primary:hover:not(:disabled) {
        background: var(--primary-hover);
      }

      .secondary {
        background: var(--panel-strong);
        border-color: var(--border);
        color: var(--text);
      }

      .secondary:hover:not(:disabled) {
        border-color: #666666;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 11px;
      }

      .panel-title {
        align-items: center;
        display: flex;
        font-weight: 650;
        justify-content: space-between;
        margin-bottom: 8px;
      }

      .dot {
        border-radius: 50%;
        display: inline-block;
        height: 8px;
        margin-right: 6px;
        width: 8px;
      }

      .idle { background: var(--muted); }
      .busy { background: var(--warn); }
      .success { background: var(--ok); }
      .failed { background: var(--danger); }

      .status-text {
        color: var(--muted);
        line-height: 1.5;
        margin: 0;
      }

      .metrics {
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(4, 1fr);
      }

      .metric {
        background: #222222;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 8px;
        min-width: 0;
      }

      .metric strong {
        display: block;
        font-size: 16px;
        margin-bottom: 2px;
      }

      .metric span {
        color: var(--muted);
        font-size: 11px;
      }

      .tools {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .log {
        background: #171717;
        border: 1px solid var(--border);
        border-radius: 6px;
        color: #d8d8d8;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 11px;
        line-height: 1.45;
        margin: 0;
        max-height: 112px;
        overflow: auto;
        padding: 8px;
        white-space: pre-wrap;
      }

      .log-wrap {
        position: relative;
      }

      .copy-log {
        align-items: center;
        background: rgba(63, 124, 255, 0.94);
        border: 0;
        border-radius: 5px;
        color: #ffffff;
        display: flex;
        height: 28px;
        justify-content: center;
        min-height: 28px;
        opacity: 0;
        padding: 0;
        pointer-events: none;
        position: absolute;
        right: 8px;
        top: 8px;
        transition: opacity 120ms ease;
        width: 28px;
      }

      .log-wrap:hover .copy-log {
        opacity: 1;
        pointer-events: auto;
      }

      .copy-log svg {
        height: 15px;
        width: 15px;
      }

      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="header">
        <div>
          <h1>Mg to Fig Exporter</h1>
          <div class="subtitle" id="context">正在连接 MasterGo...</div>
        </div>
        <div class="badge" id="version">v0.1</div>
      </section>

      <section class="actions">
        <button class="primary" id="page">解析当前页面</button>
        <button class="primary" id="selection">解析当前选区</button>
      </section>

      <section class="panel">
        <div class="panel-title">
          <span><i class="dot idle" id="statusDot"></i>运行状态</span>
          <span id="lastRun">未运行</span>
        </div>
        <p class="status-text" id="statusText">等待导出指令。</p>
      </section>

      <section class="metrics">
        <div class="metric">
          <strong id="nodes">0</strong>
          <span>节点</span>
        </div>
        <div class="metric">
          <strong id="assets">0</strong>
          <span>资源</span>
        </div>
        <div class="metric">
          <strong id="tokens">0</strong>
          <span>Token</span>
        </div>
        <div class="metric">
          <strong id="diagnostics">0</strong>
          <span>诊断</span>
        </div>
      </section>

      <section class="tools">
        <button class="secondary" id="copy" disabled>复制</button>
        <button class="secondary" id="download" disabled>下载</button>
        <button class="secondary" id="diagnose">诊断</button>
      </section>

      <section class="panel">
        <div class="panel-title">诊断与上报</div>
        <div class="log-wrap">
          <button class="copy-log" id="copyLog" title="复制诊断内容" aria-label="复制诊断内容">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
          </button>
          <pre class="log" id="log">暂无诊断信息。</pre>
        </div>
      </section>
    </main>

    <script>
      const state = {
        status: "idle",
        logs: [],
        lastResult: null,
        lastError: null
      };

      const $ = (id) => document.getElementById(id);
      const buttons = ["page", "selection"].map((id) => $(id));

      function send(type, payload = {}) {
        parent.postMessage({ type, payload }, "*");
      }

      function setBusy(isBusy) {
        for (const button of buttons) {
          button.disabled = isBusy;
        }
      }

      function setStatus(status, text) {
        state.status = status;
        $("statusText").textContent = text;
        $("lastRun").textContent = new Date().toLocaleTimeString();
        $("statusDot").className = `dot ${status}`;
      }

      function pushLog(line) {
        const stamped = `[${new Date().toLocaleTimeString()}] ${line}`;
        state.logs.unshift(stamped);
        state.logs = state.logs.slice(0, 60);
        $("log").textContent = state.logs.join("\\n");
      }

      function updateMetrics(summary = {}) {
        $("nodes").textContent = String(summary.nodes ?? 0);
        $("assets").textContent = String(summary.assets ?? 0);
        $("tokens").textContent = String(summary.tokens ?? 0);
        $("diagnostics").textContent = String(summary.diagnostics ?? 0);
      }

      async function copyText(text) {
        if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(text);
          return true;
        }
        const textarea = document.createElement("textarea");
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        const ok = document.execCommand("copy");
        textarea.remove();
        return ok;
      }

      function downloadJson(filename, data) {
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const anchor = document.createElement("a");
        anchor.href = url;
        anchor.download = filename;
        anchor.click();
        URL.revokeObjectURL(url);
      }

      $("page").onclick = () => {
        setBusy(true);
        setStatus("busy", "已发送解析当前页面指令。");
        pushLog("解析当前页面: 指令已发送");
        send("export:page");
      };

      $("selection").onclick = () => {
        setBusy(true);
        setStatus("busy", "已发送解析当前选区指令。");
        pushLog("解析当前选区: 指令已发送");
        send("export:selection");
      };

      $("copy").onclick = async () => {
        if (!state.lastResult?.document) return;
        await copyText(JSON.stringify(state.lastResult.document, null, 2));
        pushLog("导出 JSON 已复制");
      };

      $("download").onclick = () => {
        if (!state.lastResult?.document) return;
        downloadJson("mg-to-fig-document.json", state.lastResult.document);
        pushLog("导出 JSON 下载已触发");
      };

      $("diagnose").onclick = () => {
        const diagnostics = state.lastResult?.document?.diagnostics ?? [];
        if (state.lastError) {
          $("log").textContent = JSON.stringify(state.lastError, null, 2);
          return;
        }
        $("log").textContent = diagnostics.length
          ? JSON.stringify(diagnostics, null, 2)
          : "暂无诊断信息。";
      };

      $("copyLog").onclick = async () => {
        await copyText($("log").textContent);
        pushLog("诊断内容已复制");
      };

      window.onmessage = (event) => {
        const message = event.data?.pluginMessage ?? event.data;
        if (!message?.type) return;

        if (message.type === "plugin:ready") {
          $("context").textContent = `当前页: ${message.payload.pageName ?? "unknown-page"}`;
          setStatus("idle", message.payload.message ?? "插件已就绪。");
          pushLog("插件已就绪");
        }

        if (message.type === "export:status") {
          setStatus("busy", message.payload.message);
          pushLog(`${message.payload.phase}: ${message.payload.message}`);
        }

        if (message.type === "export:result") {
          state.lastResult = message.payload;
          state.lastError = null;
          setBusy(false);
          setStatus(message.payload.validation?.valid ? "success" : "failed", "导出完成。");
          updateMetrics(message.payload.summary);
          $("copy").disabled = false;
          $("download").disabled = false;
          pushLog(`导出完成: nodes=${message.payload.summary.nodes}, assets=${message.payload.summary.assets}, diagnostics=${message.payload.summary.diagnostics}`);
        }

        if (message.type === "export:error") {
          state.lastError = message.payload;
          setBusy(false);
          setStatus("failed", message.payload.message);
          pushLog(`导出失败: ${message.payload.message}`);
          $("log").textContent = JSON.stringify(message.payload, null, 2);
        }
      };

      setStatus("idle", "等待导出指令。");
      send("ui:ready");
    </script>
  </body>
</html>
