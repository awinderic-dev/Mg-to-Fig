<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Fig Import</title>
    <style>
      body {
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 16px;
      }
      textarea {
        width: 100%;
        min-height: 120px;
        margin-bottom: 8px;
      }
      input {
        width: 100%;
        margin-bottom: 8px;
      }
      button {
        width: 100%;
        margin-bottom: 8px;
        padding: 8px;
      }
      pre {
        background: #f6f6f6;
        padding: 8px;
        max-height: 100px;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <input id="package" type="file" accept=".mgfig,.zip,application/zip" />
    <button id="importPackage">导入 .mgfig 迁移包</button>
    <textarea id="json" placeholder="粘贴 document.json（调试预览）。正式方案应选择 .mgfig 迁移资源包。"></textarea>
    <button id="import">导入结构 JSON（调试）</button>
    <button id="reset">重置导入会话</button>
    <button id="close">关闭</button>
    <pre id="status">等待导入…</pre>
    <script>
      const status = document.getElementById("status");
      const jsonInput = document.getElementById("json");
      const packageInput = document.getElementById("package");
      const decoder = new TextDecoder();

      function readUint16(bytes, offset) {
        return bytes[offset] | (bytes[offset + 1] << 8);
      }

      function readUint32(bytes, offset) {
        return (
          bytes[offset]
          | (bytes[offset + 1] << 8)
          | (bytes[offset + 2] << 16)
          | (bytes[offset + 3] << 24)
        ) >>> 0;
      }

      function bytesToBase64(bytes) {
        let binary = "";
        const chunkSize = 0x8000;
        for (let index = 0; index < bytes.length; index += chunkSize) {
          const chunk = bytes.subarray(index, index + chunkSize);
          binary += String.fromCharCode(...chunk);
        }
        return btoa(binary);
      }

      function parseStoredZip(arrayBuffer) {
        const bytes = new Uint8Array(arrayBuffer);
        let endOffset = -1;
        for (let offset = bytes.length - 22; offset >= Math.max(0, bytes.length - 66000); offset -= 1) {
          if (readUint32(bytes, offset) === 0x06054b50) {
            endOffset = offset;
            break;
          }
        }
        if (endOffset === -1) throw new Error("未找到 ZIP 目录。");

        const entryCount = readUint16(bytes, endOffset + 10);
        const centralOffset = readUint32(bytes, endOffset + 16);
        const files = new Map();
        let cursor = centralOffset;

        for (let index = 0; index < entryCount; index += 1) {
          if (readUint32(bytes, cursor) !== 0x02014b50) throw new Error("ZIP 中央目录损坏。");
          const method = readUint16(bytes, cursor + 10);
          const compressedSize = readUint32(bytes, cursor + 20);
          const fileNameLength = readUint16(bytes, cursor + 28);
          const extraLength = readUint16(bytes, cursor + 30);
          const commentLength = readUint16(bytes, cursor + 32);
          const localOffset = readUint32(bytes, cursor + 42);
          const name = decoder.decode(bytes.subarray(cursor + 46, cursor + 46 + fileNameLength));

          if (method !== 0) {
            throw new Error(`暂不支持压缩过的资源包文件: ${name}`);
          }
          if (readUint32(bytes, localOffset) !== 0x04034b50) throw new Error(`ZIP 本地文件头损坏: ${name}`);

          const localNameLength = readUint16(bytes, localOffset + 26);
          const localExtraLength = readUint16(bytes, localOffset + 28);
          const dataOffset = localOffset + 30 + localNameLength + localExtraLength;
          files.set(name, bytes.slice(dataOffset, dataOffset + compressedSize));
          cursor += 46 + fileNameLength + extraLength + commentLength;
        }

        return files;
      }

      function parseJsonFile(files, path) {
        const bytes = files.get(path);
        if (!bytes) throw new Error(`资源包缺少 ${path}`);
        return JSON.parse(decoder.decode(bytes));
      }

      function hydrateDocumentAssets(document, manifest, files) {
        const nextDocument = JSON.parse(JSON.stringify(document));
        const existingAssets = new Map((nextDocument.assets ?? []).map((asset) => [asset.id, asset]));

        for (const asset of manifest.assets ?? []) {
          const existing = existingAssets.get(asset.id) ?? {};
          const nextAsset = {
            ...existing,
            id: asset.id,
            type: asset.type ?? existing.type ?? "image",
            mimeType: asset.mimeType ?? existing.mimeType ?? "application/octet-stream",
            sizeBytes: asset.sizeBytes ?? existing.sizeBytes ?? 0,
            checksum: asset.checksum ?? existing.checksum ?? null,
            width: asset.width ?? existing.width ?? null,
            height: asset.height ?? existing.height ?? null,
            uri: asset.fallbackUri ?? existing.uri ?? null
          };

          if (asset.path && files.has(asset.path)) {
            const bytes = files.get(asset.path);
            nextAsset.transport = "inline";
            nextAsset.data = bytesToBase64(bytes);
            nextAsset.sizeBytes = bytes.length;
          } else if (nextAsset.data) {
            nextAsset.transport = "inline";
          } else if (nextAsset.uri) {
            nextAsset.transport = "external";
          } else {
            nextAsset.transport = "package";
          }

          existingAssets.set(asset.id, nextAsset);
        }

        nextDocument.assets = Array.from(existingAssets.values());
        return nextDocument;
      }

      function startImport(document) {
        parent.postMessage(
          {
            pluginMessage: {
              type: "import:start",
              payload: {
                document,
                fontRuleSet: {
                  exact: {},
                  family: {}
                }
              }
            }
          },
          "*"
        );
      }

      document.getElementById("import").onclick = () => {
        try {
          const document = JSON.parse(jsonInput.value);
          startImport(document);
        } catch (error) {
          status.textContent = `document.json 解析失败: ${error.message}`;
        }
      };

      document.getElementById("importPackage").onclick = async () => {
        try {
          const file = packageInput.files?.[0];
          if (!file) throw new Error("请先选择 .mgfig 文件。");
          status.textContent = "正在读取迁移包...";
          const files = parseStoredZip(await file.arrayBuffer());
          const document = parseJsonFile(files, "document.json");
          const manifest = parseJsonFile(files, "manifest.json");
          const hydrated = hydrateDocumentAssets(document, manifest, files);
          const packagedAssets = (manifest.assets ?? []).filter((asset) => asset.path && files.has(asset.path)).length;
          status.textContent = `迁移包已解析: assets=${packagedAssets}/${manifest.assets?.length ?? 0}，正在导入...`;
          startImport(hydrated);
        } catch (error) {
          status.textContent = `.mgfig 解析失败: ${error.message}`;
        }
      };

      document.getElementById("close").onclick = () => {
        parent.postMessage({ pluginMessage: { type: "close" } }, "*");
      };

      document.getElementById("reset").onclick = () => {
        parent.postMessage({ pluginMessage: { type: "import:reset-session" } }, "*");
      };

      window.onmessage = (event) => {
        const message = event.data.pluginMessage;
        if (!message) return;
        if (message.type === "import:result") {
          const fontFallbacks = message.payload.fontPreflight?.fallbackCount ?? 0;
          const missingAssets = message.payload.preflight?.missingAssetRefs?.length ?? 0;
          status.textContent = `导入完成: created=${message.payload.createdCount}, diagnostics=${message.payload.diagnostics.length}, fontFallbacks=${fontFallbacks}, missingAssets=${missingAssets}`;
        }
        if (message.type === "import:error") {
          status.textContent = `导入失败: ${message.payload.message}`;
        }
        if (message.type === "import:session-reset") {
          status.textContent = "导入会话已重置";
        }
      };
    </script>
  </body>
</html>
